<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Top node -->
  <rect x="7" y="1" width="10" height="5" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Middle-left node -->
  <rect x="1" y="11" width="9" height="5" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Middle-right node -->
  <rect x="14" y="11" width="9" height="5" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Bottom node -->
  <rect x="7" y="19" width="10" height="4" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Arrow: top to middle-left -->
  <line x1="9" y1="6" x2="5.5" y2="11" stroke="currentColor" stroke-width="1.2"/>
  <!-- Arrow: top to middle-right -->
  <line x1="15" y1="6" x2="18.5" y2="11" stroke="currentColor" stroke-width="1.2"/>
  <!-- Arrow: middle-left to bottom -->
  <line x1="5.5" y1="16" x2="9" y2="19" stroke="currentColor" stroke-width="1.2"/>
  <!-- Arrow: middle-right to bottom -->
  <line x1="18.5" y1="16" x2="15" y2="19" stroke="currentColor" stroke-width="1.2"/>
</svg>
